name: CI

on:
  push:
    branches: [main, v2]
  pull_request:
    branches: [main, v2]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  FORCE_COLOR: "1"
  UV_FROZEN: "1"
  PYTHONUNBUFFERED: "1"

jobs:
  lint:
    name: Lint + format check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"
      - name: Install dependencies
        run: uv sync --group lint
      - name: Ruff check
        run: uv run ruff check --output-format=github
      - name: Ruff format check
        run: uv run ruff format --check

  typecheck:
    name: Type check (mypy + pyright)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"
      - name: Install dependencies
        run: uv sync --group type --group test
      - name: mypy
        run: uv run mypy
      - name: pyright
        run: uv run pyright

  test-unit:
    name: Unit tests (${{ matrix.os }} · py${{ matrix.python }})
    needs: [lint, typecheck]
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python: ["3.13", "3.14"]
        include:
          # Linux-only: free-threaded build check (advisory)
          - os: ubuntu-latest
            python: "3.13t"
            allow-failure: true
    runs-on: ${{ matrix.os }}
    continue-on-error: ${{ matrix.allow-failure == true }}
    steps:
      - uses: actions/checkout@v6
      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"
      - name: Install Python ${{ matrix.python }}
        run: uv python install ${{ matrix.python }}
      - name: Install dependencies
        run: uv sync --python ${{ matrix.python }} --all-extras --group test
      - name: Run unit + property + typing-check suites (full AnyIO backend matrix)
        # MockBackend-driven — no kernel pty required, runs clean on macOS.
        # Integration tests against real ptys live in the test-integration-linux
        # job below (DESIGN §27.7).
        run: >
          uv run --python ${{ matrix.python }} pytest
          tests/unit tests/property tests/typing_checks
          --cov --cov-report=xml -v
      - name: Upload coverage
        if: matrix.python == '3.13' && matrix.os == 'ubuntu-latest'
        uses: codecov/codecov-action@v6
        with:
          files: coverage.xml
          flags: unit
          fail_ci_if_error: false

  test-integration-linux:
    name: Integration tests — Linux pty (py${{ matrix.python }})
    needs: [lint, typecheck]
    strategy:
      fail-fast: false
      matrix:
        python: ["3.13", "3.14"]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"
      - name: Install Python ${{ matrix.python }}
        run: uv python install ${{ matrix.python }}
      - name: Install dependencies
        run: uv sync --python ${{ matrix.python }} --all-extras --group test
      - name: Run pty-backed integration tests (full AnyIO backend matrix)
        # Linux-only test modules (test_linux_*.py) stay selected here via
        # per-file skips; Darwin-compatible pty + POSIX ioctl / backend
        # tests also run on this runner. Real termios + os.read/write +
        # anyio.wait_readable path covered here; MockBackend coverage
        # lives in test-unit.
        run: >
          uv run --python ${{ matrix.python }} pytest
          tests/integration
          --cov --cov-report=xml -v
      - name: Upload coverage
        if: matrix.python == '3.13'
        uses: codecov/codecov-action@v6
        with:
          files: coverage.xml
          flags: integration
          fail_ci_if_error: false

  test-integration-macos:
    name: Integration tests — macOS pty (py${{ matrix.python }})
    needs: [lint, typecheck]
    strategy:
      fail-fast: false
      matrix:
        python: ["3.13", "3.14"]
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"
      - name: Install Python ${{ matrix.python }}
        run: uv python install ${{ matrix.python }}
      - name: Install dependencies
        run: uv sync --python ${{ matrix.python }} --all-extras --group test
      - name: Run pty-backed integration tests on Darwin (full AnyIO backend matrix)
        # Darwin ships ``pty`` / ``termios``, so POSIX ioctl, PosixBackend,
        # and SerialPort pty coverage run here against the DarwinBackend.
        # Linux-only files (TCSETS2 / ASYNC_LOW_LATENCY / TIOCSRS485
        # coverage) self-skip on this platform.
        run: >
          uv run --python ${{ matrix.python }} pytest
          tests/integration
          --cov --cov-report=xml -v
      - name: Upload coverage
        if: matrix.python == '3.13'
        uses: codecov/codecov-action@v6
        with:
          files: coverage.xml
          flags: integration-darwin
          fail_ci_if_error: false

  freebsd-smoke:
    name: Unit-test smoke — FreeBSD (best-effort)
    needs: [lint]
    # FreeBSD CI is best-effort per DESIGN §36: BSD support is
    # "hardware-test gated before first-class claims". This job runs
    # unit tests only (no integration, no hardware) so regressions in
    # the BSD backend / discovery logic surface early even while we
    # wait on real-hardware validation. Running on push only, not on
    # every PR — cross-platform VM actions are slow enough that paying
    # the cost on every PR is wasteful compared to nightly main.
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6
      - name: Run unit tests on FreeBSD 15
        uses: cross-platform-actions/action@v1.0.0
        with:
          operating_system: freebsd
          version: "15.0"
          # Default shell is sh; stay minimal. Python 3.13 is in pkg.
          # uv has no FreeBSD binary (astral-sh/uv#1560) so we bootstrap
          # a plain venv with pip + the project install instead. The job
          # is unit-tests-only, so we don't need uv's groups/lockfile —
          # just install the runtime dep + test deps directly.
          run: |
            set -e
            sudo pkg install -y python313 git
            python3.13 -m ensurepip --upgrade
            python3.13 -m venv .venv
            . .venv/bin/activate
            pip install --upgrade pip
            pip install -e '.[trio]' pytest hypothesis
            pytest tests/unit -q

  windows-smoke:
    # Companion to ``windows-serial`` below (design-windows-backend.md
    # §10.5). Kept as a tiny hosted fallback so an image refresh that breaks
    # the larger Windows dependency set still tells us whether the package
    # imports cleanly.
    name: Windows import smoke
    needs: [lint]
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true
      - name: Install Python 3.13
        run: uv python install 3.13
      - name: Install package
        run: uv sync --python 3.13
      - name: Import smoke test
        run: uv run --python 3.13 python -c "import anyserial; print(anyserial.__version__)"

  windows-serial:
    # Hosted Windows coverage stays hermetic. GitHub-hosted runners cannot
    # reliably install third-party kernel virtual-COM drivers because modern
    # Windows driver-signing policy rejects legacy com0com packages. Real
    # COM-port integration lives in windows-serial-self-hosted below.
    name: Windows unit tests (py${{ matrix.python }})
    needs: [lint, typecheck]
    strategy:
      fail-fast: false
      matrix:
        python: ["3.13", "3.14"]
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"
      - name: Install Python ${{ matrix.python }}
        run: uv python install ${{ matrix.python }}
      - name: Install dependencies
        run: uv sync --python ${{ matrix.python }} --all-extras --group test

      - name: Run unit tests (Windows)
        run: >
          uv run --python ${{ matrix.python }} pytest
          tests/unit tests/property tests/typing_checks
          --cov --cov-report=xml -v

      - name: Upload coverage
        if: matrix.python == '3.13'
        uses: codecov/codecov-action@v6
        with:
          files: coverage.xml
          flags: windows
          fail_ci_if_error: false

  windows-serial-self-hosted:
    # True Windows serial integration requires a machine whose kernel driver
    # stack is pre-provisioned: com0com, a commercial virtual-COM driver, or
    # real hardware wired as a loopback pair. Enable with repository variable
    # ANYSERIAL_RUN_SELF_HOSTED_WINDOWS=true and a runner labelled
    # anyserial-windows-serial. The pair defaults to COM50,COM51; override via
    # repository variable ANYSERIAL_WINDOWS_PAIR.
    #
    # Trigger gate: release-prep only. Runs on tag pushes (``refs/tags/v*``)
    # and manual ``workflow_dispatch``. Skipped on push-to-main and PRs so
    # the runner only needs to be online when we cut a release or debug a
    # Windows-specific regression. Ephemeral-cloud migration tracked in
    # design-windows-backend.md §10.6.
    name: Windows serial integration — self-hosted (py${{ matrix.python }})
    needs: [lint, typecheck]
    if: >-
      ${{ vars.ANYSERIAL_RUN_SELF_HOSTED_WINDOWS == 'true'
      && (github.event_name == 'workflow_dispatch'
          || startsWith(github.ref, 'refs/tags/v')) }}
    strategy:
      fail-fast: false
      matrix:
        python: ["3.13", "3.14"]
    runs-on: [self-hosted, windows, x64, anyserial-windows-serial]
    # ``timeout-minutes`` bounds job runtime **after** a runner picks it up.
    # Queue-wait is bounded by ``concurrency`` below plus GitHub's default
    # 24-hour queued-job expiry. If the self-hosted runner is offline, set
    # repository variable ``ANYSERIAL_RUN_SELF_HOSTED_WINDOWS`` to ``false``
    # to stop this job from being created at all — queued jobs on a missing
    # self-hosted runner are free on GHA's side, but any cloud VM you've
    # left running costs you regardless of job state.
    timeout-minutes: 30
    concurrency:
      group: windows-serial-self-hosted-${{ github.ref }}
      cancel-in-progress: true
    env:
      ANYSERIAL_WINDOWS_PAIR: ${{ vars.ANYSERIAL_WINDOWS_PAIR || 'COM50,COM51' }}
    steps:
      - uses: actions/checkout@v6
      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"
      - name: Install Python ${{ matrix.python }}
        run: uv python install ${{ matrix.python }}
      - name: Install dependencies
        run: uv sync --python ${{ matrix.python }} --all-extras --group test
      - name: Validate configured COM pair
        shell: pwsh
        run: |
          $ports = $env:ANYSERIAL_WINDOWS_PAIR -split ',' | ForEach-Object { $_.Trim() }
          if ($ports.Count -ne 2 -or -not $ports[0] -or -not $ports[1]) {
            throw "ANYSERIAL_WINDOWS_PAIR must be 'COMA,COMB'; got '$env:ANYSERIAL_WINDOWS_PAIR'"
          }
          $serial = Get-ItemProperty 'HKLM:\HARDWARE\DEVICEMAP\SERIALCOMM' `
            -ErrorAction SilentlyContinue
          $visible = @()
          if ($serial) {
            $visible = @($serial.PSObject.Properties.Value)
          }
          foreach ($port in $ports) {
            if ($visible -notcontains $port) {
              throw "Configured serial port $port is not visible in SERIALCOMM"
            }
          }
          Write-Host "Windows serial pair ready: $($ports -join ',')"
      - name: Run Windows integration tests
        run: >
          uv run --python ${{ matrix.python }} pytest
          tests/integration/test_windows_backend.py -q -v

  build:
    name: Build sdist + wheel
    needs: [lint, typecheck]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0  # hatch-vcs needs full history
      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
      - name: Install Python
        run: uv python install 3.13
      - name: Build
        run: uv build
      - name: Check artifacts
        run: |
          ls -la dist/
          uv run --with twine twine check dist/*
      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/
          retention-days: 7
