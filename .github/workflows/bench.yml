name: Benchmarks

# Nightly + manual runs of the pty-based benchmark suite. Hardware
# benchmarks (real FTDI / CP210x adapters) are NOT run here — they need
# a self-hosted runner with the adapters wired in. Document the wire-up
# path so a future maintainer can flip them on without re-deriving the
# requirements:
#
#   1. Provision a Linux self-hosted runner with adapters labelled
#      ``hardware-ftdi``, ``hardware-cp210x``, etc.
#   2. Add a parallel job here that sets ANYSERIAL_TEST_PORT and runs
#      ``pytest tests/hardware/ -m hardware`` plus an adapter-specific
#      bench script under benchmarks/hardware/ once it exists.
#   3. Keep the pty job below as the always-on baseline so adapter-bench
#      regressions are easy to attribute to library vs. driver changes.

on:
  schedule:
    # 04:00 UTC — outside US/EU business hours; runner queues are quiet.
    - cron: "0 4 * * *"
  workflow_dispatch:
    inputs:
      heavy:
        description: "Run heavy 128-port fan-out scenarios"
        type: boolean
        default: false

# Don't cancel in-progress nightly runs — every successful run produces
# a baseline used by the next one. Losing a run means losing a data point.
concurrency:
  group: bench-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

env:
  FORCE_COLOR: "1"
  UV_FROZEN: "1"
  PYTHONUNBUFFERED: "1"

jobs:
  bench:
    name: Pty benchmarks (linux py${{ matrix.python }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python: ["3.13"]
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v8.0.0
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Install Python ${{ matrix.python }}
        run: uv python install ${{ matrix.python }}

      - name: Install dependencies
        run: >
          uv sync --python ${{ matrix.python }}
          --all-extras --group bench --group test

      # Pull the most recent prior bench artifact so we can diff against it.
      # `if_no_artifact_found: warn` keeps the job green on the very first run
      # (and any time GHA's artifact retention has expired the baselines).
      - name: Fetch baseline (most recent prior bench run)
        id: baseline
        uses: dawidd6/action-download-artifact@v20
        with:
          workflow: bench.yml
          name_is_regexp: true
          name: ^bench-results-py${{ matrix.python }}-\d+$
          path: baseline/
          if_no_artifact_found: warn
          search_artifacts: true
        continue-on-error: true

      - name: Run benchmarks
        env:
          ANYSERIAL_BENCH_HEAVY: ${{ inputs.heavy && '1' || '' }}
        run: |
          mkdir -p benchmarks/results
          uv run --python ${{ matrix.python }} pytest benchmarks/ \
            --benchmark-only \
            --benchmark-json=benchmarks/results/current.json

      # Advisory only for now — runner variance on shared GHA hardware is
      # high enough that a strict gate would flap. Once we have ~10 baselines
      # to characterize the noise floor we can flip this to fail the job at
      # `--benchmark-compare-fail=mean:10%` per DESIGN §26.1.
      - name: Compare against baseline (advisory)
        if: hashFiles('baseline/**/current.json') != ''
        run: |
          {
            echo "## Benchmark delta vs. previous run"
            echo
            echo '```'
            uv run --python ${{ matrix.python }} pytest-benchmark compare \
              baseline/*/current.json benchmarks/results/current.json \
              --columns=median,mean,stddev,ops || true
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      # Always emit a human-readable summary, baseline or not.
      - name: Add raw run to summary
        run: |
          {
            echo "## Raw bench results"
            echo
            echo '```json'
            cat benchmarks/results/current.json | head -200
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload current results
        uses: actions/upload-artifact@v7
        with:
          name: bench-results-py${{ matrix.python }}-${{ github.run_number }}
          path: benchmarks/results/current.json
          retention-days: 90

  bench-windows:
    # Per design-windows-backend.md §11: published Windows benchmark
    # numbers for the four scenarios (round-trip, throughput, fanout,
    # open/close) over a pre-provisioned virtual or hardware COM-port pair.
    # GitHub-hosted runners cannot reliably install kernel serial drivers, so
    # this job is opt-in on a self-hosted runner labelled for anyserial.
    #
    # Trigger gate: manual ``workflow_dispatch`` only. The nightly schedule
    # does not fan out to the self-hosted runner — re-baseline Windows
    # numbers explicitly at release time. Ephemeral-cloud migration tracked
    # in design-windows-backend.md §10.6.
    name: Windows serial benchmarks — self-hosted (py${{ matrix.python }})
    if: >-
      ${{ vars.ANYSERIAL_RUN_SELF_HOSTED_WINDOWS == 'true'
      && github.event_name == 'workflow_dispatch' }}
    runs-on: [self-hosted, windows, x64, anyserial-windows-serial]
    # ``timeout-minutes`` bounds job runtime after a runner picks it up.
    # Queue-wait is bounded by ``concurrency`` below plus GitHub's default
    # 24-hour queued-job expiry. See ``ci.yml`` windows-serial-self-hosted
    # for the full cost-model note.
    timeout-minutes: 45
    concurrency:
      group: bench-windows-self-hosted-${{ github.ref }}
      cancel-in-progress: true
    env:
      ANYSERIAL_WINDOWS_PAIR: ${{ vars.ANYSERIAL_WINDOWS_PAIR || 'COM50,COM51' }}
    strategy:
      fail-fast: false
      matrix:
        python: ["3.13"]
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v8.0.0
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Install Python ${{ matrix.python }}
        run: uv python install ${{ matrix.python }}

      - name: Install dependencies
        run: >
          uv sync --python ${{ matrix.python }}
          --all-extras --group bench --group test

      - name: Validate configured COM pair
        shell: pwsh
        run: |
          $ports = $env:ANYSERIAL_WINDOWS_PAIR -split ',' | ForEach-Object { $_.Trim() }
          if ($ports.Count -ne 2 -or -not $ports[0] -or -not $ports[1]) {
            throw "ANYSERIAL_WINDOWS_PAIR must be 'COMA,COMB'; got '$env:ANYSERIAL_WINDOWS_PAIR'"
          }
          $serial = Get-ItemProperty 'HKLM:\HARDWARE\DEVICEMAP\SERIALCOMM' `
            -ErrorAction SilentlyContinue
          $visible = @()
          if ($serial) {
            $visible = @($serial.PSObject.Properties.Value)
          }
          foreach ($port in $ports) {
            if ($visible -notcontains $port) {
              throw "Configured serial port $port is not visible in SERIALCOMM"
            }
          }
          Write-Host "Windows serial pair ready: $($ports -join ',')"

      - name: Fetch baseline (most recent prior Windows bench run)
        id: baseline
        uses: dawidd6/action-download-artifact@v20
        with:
          workflow: bench.yml
          name_is_regexp: true
          name: ^bench-results-windows-py${{ matrix.python }}-\d+$
          path: baseline/
          if_no_artifact_found: warn
          search_artifacts: true
        continue-on-error: true

      - name: Run Windows benchmarks
        shell: pwsh
        env:
          ANYSERIAL_BENCH_HEAVY: ${{ inputs.heavy && '1' || '' }}
        run: |
          New-Item -ItemType Directory -Force -Path benchmarks/results | Out-Null
          uv run --python ${{ matrix.python }} pytest `
            benchmarks/test_windows_throughput.py `
            --benchmark-only `
            --benchmark-json=benchmarks/results/current.json

      - name: Compare against baseline (advisory)
        if: hashFiles('baseline/**/current.json') != ''
        shell: pwsh
        run: |
          # Single-quoted strings avoid PowerShell's backtick escape so the
          # triple-backtick markdown fences land literally in the summary.
          $fence = '```'
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value '## Windows benchmark delta vs. previous run'
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value ''
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value $fence
          $baselineFile = (Get-ChildItem baseline -Recurse -Filter current.json | Select-Object -First 1).FullName
          $compare = uv run --python ${{ matrix.python }} pytest-benchmark compare `
            $baselineFile `
            benchmarks/results/current.json `
            --columns=median,mean,stddev,ops 2>&1
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value ($compare | Out-String)
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value $fence

      - name: Add raw Windows run to summary
        shell: pwsh
        run: |
          $fence = '```'
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value '## Raw Windows bench results'
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value ''
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value ($fence + 'json')
          $json = Get-Content benchmarks/results/current.json -TotalCount 200 | Out-String
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value $json
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value $fence

      - name: Upload current Windows results
        uses: actions/upload-artifact@v7
        with:
          name: bench-results-windows-py${{ matrix.python }}-${{ github.run_number }}
          path: benchmarks/results/current.json
          retention-days: 90
