default_language_version:
  python: python3.13

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-yaml
      - id: check-toml
      - id: check-json
      - id: check-merge-conflict
      - id: check-case-conflict
      - id: check-added-large-files
        args: ["--maxkb=500"]
      - id: end-of-file-fixer
      - id: trailing-whitespace
        args: ["--markdown-linebreak-ext=md"]
      - id: mixed-line-ending
        args: ["--fix=lf"]
      - id: debug-statements
      - id: detect-private-key

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.10
    hooks:
      - id: ruff-check
        args: ["--fix", "--exit-non-zero-on-fix"]
      - id: ruff-format

  - repo: https://github.com/astral-sh/uv-pre-commit
    rev: 0.11.7
    hooks:
      - id: uv-lock

  # Local hook — runs mypy via `uv run` against the same dep groups CI
  # uses, so the local typecheck env is identical to the CI typecheck
  # env. Avoids the additional_dependencies drift that plagued the old
  # mirrors-mypy setup (where the hook venv could see a different set
  # of optional extras than CI's `uv sync --group type --group test`).
  #
  # `--frozen` makes the hook fail loudly if uv.lock no longer satisfies
  # the requested groups (rather than silently re-resolving), so a stale
  # lockfile surfaces as a typecheck failure rather than a hidden drift.
  #
  # Runs on pre-push, not every commit — mypy is the slowest hook here
  # and CI re-runs it anyway; pre-push is the right granularity for a
  # last-line-of-defense check that needs the full project venv.
  - repo: local
    hooks:
      - id: mypy
        name: mypy (matches CI typecheck env)
        entry: uv run --frozen --group type --group test mypy
        language: system
        pass_filenames: false
        files: ^(src|tests)/
        stages: [pre-push]

ci:
  autoupdate_schedule: monthly
  skip: [mypy]  # uv-driven local hook; CI runs typecheck job separately
