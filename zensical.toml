[project]
site_name = "anyserial"
site_description = "Low-latency async serial I/O for Python, built on AnyIO."
site_url = "https://graysonbellamy.github.io/anyserial/"
repo_url = "https://github.com/GraysonBellamy/anyserial"
repo_name = "GraysonBellamy/anyserial"
edit_uri = "edit/main/docs/"
docs_dir = "docs"
site_dir = "site"
nav = [
    { Home = "index.md" },
    { "Getting started" = [
        { Quickstart = "quickstart.md" },
        { "Migration from pySerial" = "migration-from-pyserial.md" },
    ] },
    { Guides = [
        { Configuration = "configuration.md" },
        { Capabilities = "capabilities.md" },
        { Discovery = "discovery.md" },
        { "Runtime reconfiguration" = "runtime-reconfiguration.md" },
        { "RS-485" = "rs485.md" },
        { Cancellation = "cancellation.md" },
        { "Sync wrapper" = "sync.md" },
    ] },
    { Platforms = [
        { "Linux tuning" = "linux-tuning.md" },
        { macOS = "darwin.md" },
        { BSD = "bsd.md" },
    ] },
    { Runtime = [
        { "AnyIO backends" = "anyio-backends.md" },
        { uvloop = "uvloop.md" },
        { Performance = "performance.md" },
    ] },
    { Development = [
        { "Hardware testing" = "hardware-testing.md" },
        { Troubleshooting = "troubleshooting.md" },
    ] },
    { Reference = [
        { Changelog = "changelog.md" },
        { Design = "design.md" },
        { "Windows backend" = "design-windows-backend.md" },
    ] },
]

[project.theme]
variant = "classic"
features = [
    "content.code.copy",
    "content.code.annotate",
    "navigation.instant",
    "navigation.tracking",
    "navigation.sections",
    "navigation.indexes",
    "search.highlight",
]

[[project.theme.palette]]
media = "(prefers-color-scheme: light)"
scheme = "default"
primary = "deep purple"
accent = "purple"
toggle.icon = "lucide/sun"
toggle.name = "Switch to dark mode"

[[project.theme.palette]]
media = "(prefers-color-scheme: dark)"
scheme = "slate"
primary = "deep purple"
accent = "purple"
toggle.icon = "lucide/moon"
toggle.name = "Switch to light mode"

[project.markdown_extensions.admonition]

[project.markdown_extensions.attr_list]

[project.markdown_extensions.md_in_html]

[project.markdown_extensions.pymdownx.details]

[project.markdown_extensions.pymdownx.highlight]
anchor_linenums = true

[project.markdown_extensions.pymdownx.inlinehilite]

[project.markdown_extensions.pymdownx.snippets]
base_path = [".", "docs"]
check_paths = true

[project.markdown_extensions.pymdownx.superfences]

[project.markdown_extensions.pymdownx.tabbed]
alternate_style = true

[project.markdown_extensions.tables]

[project.markdown_extensions.toc]
permalink = true
